name: Deploy to GitHub Pages

on:
    push:
        branches: ["main"]
    # Allows triggering this workflow manually from the Actions tab
    workflow_dispatch:

# Grant the minimum permissions needed to publish to Pages
permissions:
    contents: read
    pages: write
    id-token: write

# Only allow one concurrent deployment, but don't cancel in-progress runs
concurrency:
    group: "pages"
    cancel-in-progress: false

jobs:
    deploy:
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Pages
              uses: actions/configure-pages@v5

            - name: Upload site artifact
              uses: actions/upload-pages-artifact@v3
              with:
                  # This is a static, no-build site — the whole repo root is the site.
                  path: "."

            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4
